  - name: return_to_moria config file
    template:
      src: templates/MoriaServerConfig.ini.j2
      dest: /home/steam/.local/share/Steam/steamcmd/return_to_moria/MoriaServerConfig.ini
      owner: steam
      group: steam
    notify:
      - restart return_to_moria service

  - name: return_to_moria rules file
    template:
      src: templates/MoriaServerRules.txt.j2
      dest: /home/steam/.local/share/Steam/steamcmd/return_to_moria/MoriaServerRules.txt
      owner: steam
      group: steam
    notify:
      - restart return_to_moria service


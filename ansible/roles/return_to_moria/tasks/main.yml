  - name: return_to_moria service file
    template:
      src: templates/return_to_moria.service.j2
      dest: /etc/systemd/system/return_to_moria.service
      owner: root
      group: root
    notify:
      - restart return_to_moria service

  - name: return_to_moria service
    systemd:
     name: return_to_moria
     state: started
     enabled: true
     daemon_reload: true

  - name: return_to_moria ports
    ufw:
      rule: allow
      to_port: "{{ item }}"
      proto: "udp"
    with_items: "{{ return_to_moria_ports }}"


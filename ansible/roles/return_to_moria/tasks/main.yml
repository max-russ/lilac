---
  - name: dependency repos
    apt_repository:
      repo: "{{ item }}"
      state: present
    with_items: "{{ non_free_repos }}"

  - name: dpkg 32bit arch
    command: dpkg --add-architecture i386

  - name: packages
    apt:
      pkg:
      - software-properties-common
      - wine
      - xvfb
      # - steamcmd
      state: latest
      update_cache: yes

  - name: steamcmd debconf seen
    debconf:
      name: "steamcmd"
      question: "steam/license"
      vtype: "seen"
      value: "true"

  - name: steamcmd debconf selection
    debconf:
      name: "steamcmd"
      question: "steam/question"
      value: "I AGREE"
      vtype: "select"


  - name: steam group
    group:
      name: steam
      state: present

  - name: steam user
    user:
      name: steam
      group: steam
      create_home: true
      shell: /bin/bash

  - name: download return_to_moria
    command: /usr/games/steamcmd +login anonymous +force_install_dir return_to_moria +app_update 3349480 +quit
    become: yes
    become_user: steam
    args:
      chdir: /home/steam
    notify: 
      - restart return_to_moria service

